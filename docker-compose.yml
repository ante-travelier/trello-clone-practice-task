services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trello_clone
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/trello_clone"
      JWT_SECRET: "dev-access-token-secret-32chars-long"
      JWT_REFRESH_SECRET: "dev-refresh-token-secret-32chars-long"
      PORT: "4000"
      CLIENT_URL: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:4000/api"

volumes:
  pgdata:
